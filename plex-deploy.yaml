apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  labels:
    app: plex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      containers:
        - name: plex
          image: plexinc/pms-docker:latest # Or linuxserver/plex for ARM64
          env:
            - name: PLEX_CLAIM
              value: "claim-TyBrQ21D9Bm_Sf11ayiU" # Obtain from plex.tv/claim
            - name: TZ
              value: "America/Chicago" # Set your timezone
          ports:
            - containerPort: 32400
              protocol: TCP
            - containerPort: 3005
              protocol: TCP
            - containerPort: 8324
              protocol: TCP
            - containerPort: 32469
              protocol: TCP
            - containerPort: 32410
              protocol: UDP
            - containerPort: 32412
              protocol: UDP
            - containerPort: 32413
              protocol: UDP
            - containerPort: 32414
              protocol: UDP
          volumeMounts:
            - name: nfs-pv-config
              mountPath: /config/plex
            - name: nfs-pv-movies
              mountPath: /data/Movies # Or specific paths like /data/movies, /data/tv
            - name: nfs-pv-tv
              mountPath: /data/TV # Or specific paths like /data/movies, /data/tv
      volumes:
        - name: nfs-pv-config
          persistentVolumeClaim:
            claimName: config-pvc
        - name: nfs-pv-movies
          persistentVolumeClaim:
            claimName: movies-pvc
        - name: nfs-pv-tv
          persistentVolumeClaim:
            claimName: tv-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: plex-service
spec:
  selector:
    app: plex
  ports:
    - name: http
      protocol: TCP
      port: 32400
      targetPort: 32400
    - name: gdm-3005
      protocol: TCP
      port: 3005
      targetPort: 3005
    - name: dlna-8324
      protocol: TCP
      port: 8324
      targetPort: 8324
    - name: dlna-32469
      protocol: TCP
      port: 32469
      targetPort: 32469
    - name: gdm-udp-1
      protocol: UDP
      port: 32410
      targetPort: 32410
    - name: gdm-udp-2
      protocol: UDP
      port: 32412
      targetPort: 32412
    - name: gdm-udp-3
      protocol: UDP
      port: 32413
      targetPort: 32413
    - name: gdm-udp-4
      protocol: UDP
      port: 32414
      targetPort: 32414
  type: LoadBalancer