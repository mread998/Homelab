apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: movies-pvc
  namespace: media-server 
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi         # ≤ PV capacity; purely for matching
  volumeName: nfs-pv-movies  # <-- direct bind to the PV (static provisioning)
  storageClassName: ""      # important: empty for static PVs
