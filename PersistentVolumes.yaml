apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-pv-movies
spec:
  capacity:
    storage: 100Gi        # logical size; NFS ignores it but PVC must match/fit
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:           # optional but useful
    - nfsvers=4.1
    - rsize=1048576
    - wsize=1048576
    - hard
    - timeo=600
    - retrans=2
  nfs:
    server: 10.11.11.46
    path: /mnt/data/Movies   # <-- the *existing* directory with your files
---
