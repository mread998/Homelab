apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-sabnzbd-config
  labels:
    app: sabnzbd
    tier: config
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  storageClassName: ""
  nfs:
    server: 10.11.11.46
    path: /mnt/data/AppConfig/Sabnzbd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-sabnzbd-config
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: ""
  selector:
    matchLabels:
      app: sabnzbd
      tier: config
---
apiVersion: v1
kind: PersistentVolume
metadata:
