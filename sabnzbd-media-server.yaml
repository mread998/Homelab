apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  namespace: media-server  
  replicas: 1
  selector:
    matchLabels:
      app: sabnzbd
  template:
    metadata:
      labels:
        app: sabnzbd
    spec:
      containers:
        - name: sabnzbd
          image: lscr.io/linuxserver/sabnzbd:latest # Or your preferred SABnzbd image
          ports:
            - containerPort: 8080 # SABnzbd web UI port
          env:
            - name: PUID
              value: "1000" # User ID for container
            - name: PGID
              value: "1000" # Group ID for container
            - name: TZ
              value: "America/Chicago" # Your timezone
          volumeMounts:
            - name: nfs-pv-config
              mountPath: /config/sabnzbd
            - name: nfs-pv-downloads
              mountPath: /downloads/complete
            - name: nfs-pv-downloads
              mountPath: /downloads/incomplete
      volumes:
       - name: nfs-pv-config
         persistentVolumeClaim:
          claimName: config-pvc 
       - name: nfs-pv-downloads
         persistentVolumeClaim:
            claimName: nfs-pv-downloads # Mount the PVC for downloads (adjust if separate storage is desired)
       - name: nfs-pv-downloads
         persistentVolumeClaim:
            claimName: nfs-pv-downloads # Mount the PVC for incomplete files (adjust if separate storage is desired)